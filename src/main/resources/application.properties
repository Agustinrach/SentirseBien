spring.datasource.url=jdbc:mysql://root:NEbUToMQdpiQiWnWLbtIGzcEIaNArbik@mysql.railway.internal:3306/railway
spring.datasource.username=root
spring.datasource.password=NEbUToMQdpiQiWnWLbtIGzcEIaNArbik

# Mostrar logs de cada consulta SQL
spring.jpa.show-sql=true

# Hibernate ddl auto (create, create-drop, update)
spring.jpa.hibernate.ddl-auto=update

# Clase del driver para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialect para MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Formatear el SQL
spring.jpa.properties.hibernate.format_sql=true

# Desactivar página de error por defecto
server.error.whitelabel.enabled=false
server.error.path=/error

# Logs detallados para Spring Security
logging.level.org.springframework.security=DEBUG

# Ubicación de recursos estáticos
spring.resources.static-locations=classpath:/static/

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

